name: plotlymol
channels:
  - conda-forge
dependencies:
  # Python - version not pinned here; let CI matrix or user choose
  - python>=3.9

  # Runtime
  - rdkit>=2022.3.1
  - plotly>=5.0.0
  - numpy>=1.20.0

  # GUI
  - streamlit>=1.30.0

  # Testing
  - pytest>=7.0.0
  - pytest-cov>=4.0.0

  # Code quality
  - black>=24.3.0
  - ruff>=0.1.0
  - flake8>=6.0.0
  - mypy>=1.0.0
  - pre-commit>=3.0.0

  # Security scanning
  - pip-audit>=2.6.0

  # Documentation (conda-forge)
  - mkdocs>=1.5.0
  - mkdocs-material>=9.5.0

  # pip-only packages
  - pip
  - pip:
    - kaleido>=0.2.1
    - mkdocstrings[python]>=0.24.0
    - mkdocs-jupyter>=0.24.0
