name: Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

defaults:
  run:
    shell: bash -el {0}

jobs:
  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up conda environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: "3.11"
          environment-file: environment.yml
          activate-environment: plotlymol
          auto-activate: false
          miniforge-version: latest
          conda-solver: libmamba

      - name: Check formatting with Black
        run: black --check --diff src/plotlymol3d tests

      - name: Lint with Ruff
        run: ruff check src/plotlymol3d tests

  type-check:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up conda environment
        uses: conda-incubator/setup-miniconda@v3
        with:
          python-version: "3.11"
          environment-file: environment.yml
          activate-environment: plotlymol
          auto-activate: false
          miniforge-version: latest
          conda-solver: libmamba

      - name: Install package in editable mode
        run: pip install -e .

      - name: Install mypy stubs
        run: pip install types-requests

      - name: Type check with mypy
        run: mypy src/plotlymol3d --ignore-missing-imports --disable-error-code=import-untyped
